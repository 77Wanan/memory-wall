<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆墙</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记忆墙">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-layout">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">📋 记忆列表</div>
    <div id="sidebarList"></div>
  </div>
  <div class="content-area">
    <div class="header">
      <h1><button class="hamburger" id="hamburgerBtn">☰</button><span class="mark"></span>记忆·墙</h1>
      <div class="stats-wrap">
        <span class="stats" id="stats">0</span>
        <button class="theme-btn" id="themeBtn">☀️ 昼</button>
      </div>
    </div>
    <div class="input-row" id="inputRow">
      <div class="input-top">
        <input type="text" class="input-title" id="noteTitle" placeholder="标题（选填）…">
        <div class="input-options">
          <div class="mode-toggle">
            <button class="mode-btn active" id="modeShort">短文</button>
            <button class="mode-btn" id="modeLong">长文</button>
          </div>
        </div>
      </div>
      <textarea id="newNote" placeholder="写一条记忆…"></textarea>
      <div class="input-bottom">
        <select id="newTag">
          <option value="默认">📌</option>
          <option value="学习">📖</option>
          <option value="日常">☕</option>
          <option value="技术">⚙️</option>
          <option value="灵感">💡</option>
          <option value="心情">❤️</option>
        </select>
        <button id="addBtn">存</button>
      </div>
    </div>
    <div class="toolbar">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="搜索记忆…">
        <button class="search-mode-btn" id="searchModeBtn">关键词</button>
      </div>
      <div class="filters" id="filters">
        <span class="filter-tag active" data-tag="all">全部</span>
      </div>
      <div class="data-actions">
        <button class="data-btn" id="exportBtn">↓ 导出</button>
        <button class="data-btn" id="importBtn">↑ 导入</button>
        <input type="file" id="importFile" accept=".json" style="display:none">
      </div>
    </div>
    <div id="groupContainer"></div>
    <div id="loadMoreContainer"></div>
    <div class="float-view" id="floatView">
      <div class="modal">
        <button class="float-close" id="floatClose">✕</button>
        <div class="float-tag" id="floatTag"></div>
        <div class="float-title" id="floatTitle"></div>
        <div class="float-content" id="floatContent"></div>
        <div class="float-time" id="floatTime"></div>
      </div>
    </div>
    <div class="overlay" id="modal">
      <div class="modal">
        <h2>✎ 编辑</h2>
        <input type="text" class="edit-title" id="editTitle" placeholder="标题（选填）">
        <textarea id="editContent"></textarea>
        <select id="editTag">
          <option value="默认">📌 默认</option>
          <option value="学习">📖 学习</option>
          <option value="日常">☕ 日常</option>
          <option value="技术">⚙️ 技术</option>
          <option value="灵感">💡 灵感</option>
          <option value="心情">❤️ 心情</option>
        </select>
        <div class="modal-actions">
          <button id="cancelEdit">取消</button>
          <button class="btn-save" id="saveEdit">保存</button>
        </div>
      </div>
    </div>
    <div class="footer">✦ 莫兰迪 · 昼夜自转 ✦</div>
  </div>
</div>

<!-- Chat AI -->
<button class="chat-btn" id="chatBtn">✦</button>
<div class="chat-panel" id="chatPanel">
  <div class="chat-header">
    <span>✦ AI 助手</span>
    <div style="display:flex;gap:2px;align-items:center;">
      <button id="chatClear" title="清空对话">↺</button>
      <button id="chatClose">✕</button>
    </div>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-msg ai">你好！我是你的笔记助手，可以帮你搜索和整理笔记内容。</div>
  </div>
  <div class="chat-input-area">
    <input type="text" class="chat-input" id="chatInput" placeholder="问关于笔记的问题…">
    <button class="chat-send" id="chatSend">发送</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
